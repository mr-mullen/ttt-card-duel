<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTT Card Duel — Tic-Tac-Toe Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>
  <div class="crt" id="game-container">
    <header class="game-header">
      <h1>TTT CARD DUEL v1.0</h1>
      <div class="match-info">
        <span id="current-match">Match 1</span>
        <span class="separator">|</span>
        <span id="turn-indicator">TURN: P1</span>
        <span class="separator">|</span>
        <span id="round-counter">Round: 0</span>
      </div>
      <div class="header-actions">
        <span class="status">Match Winner: <span id="match-winner">None yet</span></span>
      </div>
    </header>

    <main class="game-board">
      <aside class="player-panel player-1">
        <h2>PLAYER 1</h2>
        <div class="player-stats">
          <div class="stat">HP: <span id="p1-hp">████████</span></div>
          <div class="stat">SCORE: <span id="p1-score">0</span></div>
        </div>
        <div class="hand-container" id="p1-hand">
          <!-- Cards injected by JS -->
        </div>
      </aside>

      <section class="board-section">
        <div class="board-frame">
          <div id="game-board" class="board"></div>
        </div>
        <div class="board-actions">
          <button id="end-turn-btn" class="action-btn">End Turn</button>
          <button id="restart-round-btn" class="action-btn hidden">New Round</button>
        </div>
      </section>

      <aside class="player-panel player-2">
        <h2>PLAYER 2</h2>
        <div class="player-stats">
          <div class="stat">HP: <span id="p2-hp">████████</span></div>
          <div class="stat">SCORE: <span id="p2-score">0</span></div>
        </div>
        <div class="hand-container" id="p2-hand">
          <!-- Cards injected by JS -->
        </div>
      </aside>
    </main>

    <aside class="event-log-panel">
      <h2>EVENT LOG</h2>
      <ul id="event-log" class="event-list"></ul>
    </aside>

    <dialog id="card-modal" class="card-modal">
      <div class="modal-content">
        <h3 id="modal-card-name">Card Name</h3>
        <div id="modal-card-art" class="modal-card-art"></div>
        <p id="modal-card-desc">Card description</p>
        <div id="modal-card-effect">Effect: description</div>
        <div class="modal-actions">
          <button id="modal-confirm-btn" class="primary-btn">Play Card</button>
          <button id="modal-cancel-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </dialog>

    <dialog id="move-modal" class="move-modal">
      <div class="modal-content move-content">
        <h3>Place Your Piece</h3>
        <div id="valid-squares" class="valid-squares-list"></div>
        <p id="move-hint">Click a square to place your piece</p>
        <div class="modal-actions">
          <button id="move-cancel-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </dialog>

    <footer class="settings-panel">
      <button id="settings-btn" class="settings-btn">⚙️ Settings</button>
      <div id="settings-menu" class="settings-menu hidden">
        <div class="setting-group">
          <label for="color-picker">Text Color:</label>
          <input type="color" id="color-picker" value="#00FF41">
        </div>
        <div class="setting-group">
          <label for="font-select">Font:</label>
          <select id="font-select">
            <option value="monospace">Courier New</option>
            <option value="Share Tech Mono" selected>Share Tech Mono</option>
            <option value="VT323">VT323</option>
            <option value="Fira Code">Fira Code</option>
            <option value="IBM Plex Mono">IBM Plex Mono</option>
            <option value="Inconsolata">Inconsolata</option>
          </select>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="scanlines-checkbox" checked>
            Scanlines
          </label>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="sound-checkbox" checked>
            Sound Effects
          </label>
        </div>
        <div class="setting-group">
          <label>
            <input type="checkbox" id="flicker-checkbox">
            Screen Flicker
          </label>
        </div>
        <button id="settings-close-btn" class="secondary-btn">Close</button>
      </div>
    </footer>
  </div>

  <script src="js/settings.js"></script>
  <script src="js/board.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/game.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
