<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTT CARD DUEL v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body class="crt">
  <div class="game-container">
    <header class="header">
      <h1 class="glow">TTT CARD DUEL v1.0</h1>
      <div class="header-controls">
        <label>
          COLOR:
          <input type="color" id="header-color" value="#00FF41" disabled>
        </label>
        <label>
          FONT:
          <select id="header-font" disabled>
            <option value="Share Tech Mono" selected>Share Tech Mono</option>
            <option value="VT323">VT323</option>
            <option value="Fira Code">Fira Code</option>
            <option value="IBM Plex Mono">IBM Plex Mono</option>
            <option value="Inconsolata">Inconsolata</option>
            <option value="Courier New">Courier New</option>
          </select>
        </label>
        <button id="settings-btn" class="glow-subtle">[SETTINGS]</button>
      </div>
      <div id="turn-indicator" class="turn-indicator p1">TURN: P1</div>
    </header>

    <aside class="left-panel">
      <div class="player-hand">
        <h3 class="glow">◆ PLAYER 1</h3>
        <div class="player-stats">
          <span id="score-p1" class="score-display">Wins: 0</span>
        </div>
        <div id="hand-p1" class="hand-cards"></div>
      </div>

      <div class="player-hand">
        <h3 class="glow">◆ PLAYER 2</h3>
        <div class="player-stats">
          <span id="score-p2" class="score-display">Wins: 0</span>
        </div>
        <div id="hand-p2" class="hand-cards"></div>
      </div>
    </aside>

    <main class="main-area">
      <section class="board-section">
        <div id="board" class="board"></div>
      </section>

      <section class="event-log">
        <h3 class="glow">EVENT LOG</h3>
        <div id="log-entries" class="log-entries"></div>
      </section>
    </main>

    <div id="phase-indicator" class="phase-indicator" style="grid-column: 1/-1; text-align: center; padding: 5px;">
      PHASE: PLAY
    </div>
  </div>

  <div id="overlay" class="overlay"></div>

  <div id="settings-panel" class="settings-panel">
    <h2 class="glow">[SETTINGS]</h2>
    <div class="settings-row">
      <label>Text Color:</label>
      <input type="color" id="settings-color" value="#00FF41">
    </div>
    <div class="settings-row">
      <label>Font:</label>
      <select id="settings-font">
        <option value="Share Tech Mono" selected>Share Tech Mono</option>
        <option value="VT323">VT323</option>
        <option value="Fira Code">Fira Code</option>
        <option value="IBM Plex Mono">IBM Plex Mono</option>
        <option value="Inconsolata">Inconsolata</option>
        <option value="Courier New">Courier New</option>
      </select>
    </div>
    <div class="settings-row">
      <label>Sound Effects:</label>
      <input type="checkbox" id="settings-sound" checked>
    </div>
    <div class="settings-row">
      <label>Scanlines:</label>
      <input type="checkbox" id="settings-scanlines" checked>
    </div>
    <button id="close-settings" class="close-settings">[CLOSE]</button>
  </div>

  <div id="win-modal" class="win-modal">
    <h2 id="win-text" class="glow">P1 WINS!</h2>
    <p>Congratulations on your victory!</p>
    <div class="controls">
      <button id="new-game-btn">[NEW MATCH]</button>
      <button id="play-again-btn">[PLAY AGAIN]</button>
    </div>
  </div>

  <script src="js/ascii.js"></script>
  <script src="js/game.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/effects/board-effects.js"></script>
  <script src="js/effects/piece-effects.js"></script>
  <script src="js/effects/opponent-effects.js"></script>
  <script src="js/effects/win-effects.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
